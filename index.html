<html lang="en">

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;


// ─── ONE-TIME LEAD GATE ───────────────────────────────────────────────────────
function LeadGate({ onUnlock }) {
  const [f, setF] = useState({ name: "", email: "", phone: "", company: "", type: "" });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const validate = () => {
    const e = {};
    if (!f.name.trim()) e.name = "Required";
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email)) e.email = "Valid email required";
    if (!f.phone.trim()) e.phone = "Required";
    if (!f.company.trim()) e.company = "Required";
    if (!f.type) e.type = "Please select one";
    return e;
  };

  const submit = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setLoading(true);
    setTimeout(() => { setLoading(false); setDone(true); }, 1000);
  };

  const inp = (err) => ({
    width: "100%", padding: "11px 14px",
    background: "#0a0a1c",
    border: `1px solid ${err ? "#f55" : "#ffffff18"}`,
    borderRadius: 10, color: "#fff", fontSize: 14,
    outline: "none", boxSizing: "border-box",
    fontFamily: "inherit",
    transition: "border .2s",
  });

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 999,
      background: "linear-gradient(135deg, #07070F 0%, #0d0d25 100%)",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: 20, overflow: "auto",
    }}>
      {/* BG grid */}
      <div style={{ position: "fixed", inset: 0, backgroundImage: "linear-gradient(#ffffff04 1px,transparent 1px),linear-gradient(90deg,#ffffff04 1px,transparent 1px)", backgroundSize: "40px 40px", pointerEvents: "none" }} />
      {/* Orbs */}
      <div style={{ position: "fixed", top: "20%", left: "10%", width: 400, height: 400, background: "#4361EE", borderRadius: "50%", filter: "blur(140px)", opacity: 0.07, pointerEvents: "none" }} />
      <div style={{ position: "fixed", bottom: "20%", right: "10%", width: 300, height: 300, background: "#FF6B35", borderRadius: "50%", filter: "blur(120px)", opacity: 0.08, pointerEvents: "none" }} />

      <div style={{
        position: "relative", zIndex: 1,
        background: "#0d0d1f",
        border: "1px solid #ffffff12",
        borderRadius: 24, width: "100%", maxWidth: 500,
        padding: "44px 40px",
        boxShadow: "0 40px 100px rgba(0,0,0,0.6)",
        animation: "pop .3s cubic-bezier(.34,1.56,.64,1)",
      }}>
        {!done ? (
          <>
            {/* Logo / Brand */}
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ fontSize: 42, marginBottom: 10 }}>⚓</div>
              <h1 style={{ color: "#fff", fontSize: 22, fontWeight: 800, margin: "0 0 6px" }}>
                FreightTools Pro
              </h1>
              <p style={{ color: "#555", fontSize: 13, margin: 0 }}>
                9 free professional logistics tools · Sign up once, access everything.
              </p>
            </div>

            {/* Tool preview pills */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center", marginBottom: 28 }}>
              {["📦 CBM Calc", "⚖️ Chargeable Wt", "🚢 Container Planner", "🗺️ Transit Time", "🔍 HS Code Finder", "📋 Incoterms", "🏛️ Duty Estimator", "🌿 Carbon Tool", "🛡️ Cargo Insurance"].map(t => (
                <span key={t} style={{ background: "#ffffff08", border: "1px solid #ffffff10", borderRadius: 20, padding: "4px 10px", fontSize: 11, color: "#777", fontWeight: 600 }}>{t}</span>
              ))}
            </div>

            {/* Form fields */}
            {[
              { key: "name", label: "Full Name", ph: "John Smith", type: "text" },
              { key: "email", label: "Work Email", ph: "john@company.com", type: "email" },
              { key: "phone", label: "Contact No.", ph: "+971 50 000 0000", type: "tel" },
              { key: "company", label: "Company Name", ph: "Acme Freight LLC", type: "text" },
            ].map(({ key, label, ph, type }) => (
              <div key={key} style={{ marginBottom: 14 }}>
                <label style={{ display: "block", color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 5 }}>{label}</label>
                <input
                  type={type} placeholder={ph} value={f[key]}
                  onChange={e => { setF({ ...f, [key]: e.target.value }); setErrors({ ...errors, [key]: null }); }}
                  onKeyDown={e => e.key === "Enter" && submit()}
                  style={inp(errors[key])}
                />
                {errors[key] && <span style={{ color: "#f55", fontSize: 11 }}>{errors[key]}</span>}
              </div>
            ))}

            {/* User type selector */}
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 10 }}>
                I am a... {errors.type && <span style={{ color: "#f55", fontSize: 11, textTransform: "none", letterSpacing: 0 }}>— {errors.type}</span>}
              </label>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {[
                  { val: "freight_forwarder", icon: "🏢", label: "Freight Forwarder", sub: "3PL / NVOCC / Broker" },
                  { val: "end_user", icon: "📦", label: "End User / Shipper", sub: "Importer / Exporter" },
                ].map(opt => (
                  <div
                    key={opt.val}
                    onClick={() => { setF({ ...f, type: opt.val }); setErrors({ ...errors, type: null }); }}
                    style={{
                      padding: "14px 12px", borderRadius: 12, cursor: "pointer", textAlign: "center",
                      background: f.type === opt.val ? "#4361EE18" : "#ffffff06",
                      border: `2px solid ${f.type === opt.val ? "#4361EE" : errors.type ? "#f5550060" : "#ffffff10"}`,
                      transition: "all .15s",
                    }}
                  >
                    <div style={{ fontSize: 26, marginBottom: 6 }}>{opt.icon}</div>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginBottom: 2 }}>
                      <div style={{
                        width: 16, height: 16, borderRadius: "50%",
                        border: `2px solid ${f.type === opt.val ? "#4361EE" : "#ffffff20"}`,
                        background: f.type === opt.val ? "#4361EE" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        flexShrink: 0,
                        transition: "all .15s",
                      }}>
                        {f.type === opt.val && <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#fff" }} />}
                      </div>
                      <span style={{ color: f.type === opt.val ? "#fff" : "#aaa", fontSize: 13, fontWeight: 800 }}>{opt.label}</span>
                    </div>
                    <div style={{ color: "#555", fontSize: 11 }}>{opt.sub}</div>
                  </div>
                ))}
              </div>
            </div>

            <button onClick={submit} disabled={loading} style={{
              width: "100%", padding: 14,
              background: loading ? "#1a1a2e" : "linear-gradient(135deg,#4361EE,#7209B7)",
              border: "none", borderRadius: 12, color: "#fff",
              fontSize: 15, fontWeight: 800, cursor: loading ? "not-allowed" : "pointer",
              letterSpacing: 0.5, transition: "opacity .2s",
            }}>
              {loading ? "Setting up your access..." : "🔓 Get Free Access to All 9 Tools →"}
            </button>
            <p style={{ color: "#333", fontSize: 11, textAlign: "center", marginTop: 12 }}>
              No spam · No subscription · Your data stays private
            </p>
          </>
        ) : (
          <div style={{ textAlign: "center", padding: "10px 0" }}>
            <div style={{ fontSize: 64, marginBottom: 16 }}>🎉</div>
            <h2 style={{ color: "#fff", fontSize: 24, fontWeight: 800, margin: "0 0 10px" }}>
              Welcome, {f.name.split(" ")[0]}!
            </h2>
            <p style={{ color: "#666", fontSize: 14, marginBottom: 8, lineHeight: 1.6 }}>
              Your account has been created as a <strong style={{ color: "#4361EE" }}>
                {f.type === "freight_forwarder" ? "Freight Forwarder" : "End User / Shipper"}
              </strong>.
            </p>
            <p style={{ color: "#555", fontSize: 13, marginBottom: 28 }}>
              All 9 tools are now unlocked. You'll never need to sign in again on this device.
            </p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginBottom: 28 }}>
              {["📦 CBM", "⚖️ Chargeable", "🚢 Container", "🗺️ Transit", "🔍 HS Code", "📋 Incoterms", "🏛️ Duty", "🌿 Carbon", "🛡️ Insurance"].map(t => (
                <span key={t} style={{ background: "#4361EE20", border: "1px solid #4361EE40", borderRadius: 20, padding: "5px 12px", fontSize: 12, color: "#4361EE", fontWeight: 700 }}>✓ {t}</span>
              ))}
            </div>
            <button onClick={() => onUnlock({ name: f.name, type: f.type, company: f.company })} style={{
              width: "100%", padding: 14,
              background: "linear-gradient(135deg,#4361EE,#7209B7)",
              border: "none", borderRadius: 12, color: "#fff",
              fontSize: 15, fontWeight: 800, cursor: "pointer",
            }}>
              Open My Toolkit →
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── TOOL: CBM + CHARGEABLE WEIGHT ───────────────────────────────────────────
function CBMTool() {
  const [rows, setRows] = useState([{ l: "", w: "", h: "", qty: "1", wt: "", unit: "cm" }]);
  const [mode, setMode] = useState("air");
  const results = rows.map(r => {
    const f = r.unit === "in" ? 2.54 : r.unit === "m" ? 100 : 1;
    const L = parseFloat(r.l) * f, W = parseFloat(r.w) * f, H = parseFloat(r.h) * f;
    const qty = parseInt(r.qty) || 1, wt = parseFloat(r.wt) || 0;
    if (!L || !W || !H) return null;
    const cbm = (L * W * H * qty) / 1e6;
    const div = mode === "air" ? 6000 : mode === "sea" ? 1000 : 5000;
    const volWt = (L * W * H * qty) / div;
    const actWt = wt * qty;
    return { cbm, volWt, actWt, chargeable: Math.max(volWt, actWt) };
  }).filter(Boolean);
  const T = results.reduce((a, r) => ({ cbm: a.cbm + r.cbm, volWt: a.volWt + r.volWt, actWt: a.actWt + r.actWt, chargeable: a.chargeable + r.chargeable }), { cbm: 0, volWt: 0, actWt: 0, chargeable: 0 });
  const addRow = () => setRows([...rows, { l: "", w: "", h: "", qty: "1", wt: "", unit: "cm" }]);
  const upd = (i, k, v) => setRows(rows.map((r, idx) => idx === i ? { ...r, [k]: v } : r));
  const rem = i => rows.length > 1 && setRows(rows.filter((_, idx) => idx !== i));
  const containers = [{ n: "20ft", c: 25 }, { n: "40ft", c: 55 }, { n: "40ft HQ", c: 68 }];
  const si = { background: "#0a0a18", border: "1px solid #ffffff15", borderRadius: 8, color: "#fff", padding: "8px 10px", fontSize: 13, outline: "none", width: "100%", boxSizing: "border-box", fontFamily: "inherit" };
  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
        {[["air", "✈️ Air (÷6000)"], ["sea", "🚢 Sea LCL (÷1000)"], ["courier", "📦 Courier (÷5000)"]].map(([m, l]) => (
          <button key={m} onClick={() => setMode(m)} style={{ padding: "8px 14px", borderRadius: 20, background: mode === m ? "#FF6B35" : "#ffffff08", border: `1px solid ${mode === m ? "#FF6B35" : "#ffffff12"}`, color: mode === m ? "#fff" : "#888", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{l}</button>
        ))}
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead><tr>{["Unit", "L", "W", "H", "Qty", "Wt/pc (kg)", ""].map(h => <th key={h} style={{ color: "#555", fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", padding: "6px 5px", textAlign: "left" }}>{h}</th>)}</tr></thead>
          <tbody>{rows.map((r, i) => (
            <tr key={i}>
              <td style={{ padding: "4px 3px" }}><select value={r.unit} onChange={e => upd(i, "unit", e.target.value)} style={{ ...si, width: 65 }}><option value="cm">cm</option><option value="in">in</option><option value="m">m</option></select></td>
              {["l", "w", "h"].map(k => <td key={k} style={{ padding: "4px 3px" }}><input type="number" min="0" value={r[k]} onChange={e => upd(i, k, e.target.value)} placeholder="0" style={{ ...si, width: 72 }} /></td>)}
              <td style={{ padding: "4px 3px" }}><input type="number" min="1" value={r.qty} onChange={e => upd(i, "qty", e.target.value)} style={{ ...si, width: 55 }} /></td>
              <td style={{ padding: "4px 3px" }}><input type="number" min="0" value={r.wt} onChange={e => upd(i, "wt", e.target.value)} placeholder="0" style={{ ...si, width: 85 }} /></td>
              <td style={{ padding: "4px 3px" }}><button onClick={() => rem(i)} style={{ background: "#f5540018", border: "1px solid #f5540030", color: "#f55", borderRadius: 6, padding: "6px 9px", cursor: "pointer", fontSize: 12 }}>✕</button></td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <button onClick={addRow} style={{ marginTop: 10, padding: "7px 14px", background: "#ffffff08", border: "1px solid #ffffff12", borderRadius: 8, color: "#777", fontSize: 12, cursor: "pointer" }}>+ Add Row</button>
      {T.cbm > 0 && <>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))", gap: 10, marginTop: 20 }}>
          {[{ l: "Total CBM", v: T.cbm.toFixed(4), s: `${(T.cbm * 35.315).toFixed(2)} CFT` }, { l: "Volumetric Wt", v: `${T.volWt.toFixed(2)} kg`, s: `${(T.volWt * 2.205).toFixed(1)} lbs` }, { l: "Actual Wt", v: `${T.actWt.toFixed(2)} kg`, s: `${(T.actWt * 2.205).toFixed(1)} lbs` }, { l: "Chargeable Wt", v: `${T.chargeable.toFixed(2)} kg`, s: T.volWt > T.actWt ? "📐 Vol. wins" : "⚖️ Actual wins", h: true }].map(c => (
            <div key={c.l} style={{ background: c.h ? "#FF6B3512" : "#ffffff06", border: `1px solid ${c.h ? "#FF6B3545" : "#ffffff10"}`, borderRadius: 10, padding: "12px 14px" }}>
              <div style={{ color: "#666", fontSize: 10, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase" }}>{c.l}</div>
              <div style={{ color: c.h ? "#FF6B35" : "#fff", fontSize: 17, fontWeight: 800, margin: "4px 0 2px" }}>{c.v}</div>
              <div style={{ color: "#555", fontSize: 11 }}>{c.s}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 16 }}>
          <div style={{ color: "#555", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Container Fit</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {containers.map(c => { const p = Math.min((T.cbm / c.c) * 100, 100); const ov = T.cbm > c.c; return (
              <div key={c.n} style={{ flex: 1, minWidth: 120, background: "#ffffff06", border: `1px solid ${ov ? "#f5540040" : "#ffffff10"}`, borderRadius: 10, padding: "10px 12px" }}>
                <div style={{ color: "#fff", fontWeight: 800, fontSize: 12, marginBottom: 6 }}>{c.n}</div>
                <div style={{ background: "#ffffff08", borderRadius: 4, height: 7, overflow: "hidden", marginBottom: 5 }}>
                  <div style={{ height: "100%", width: `${p}%`, background: ov ? "#f55" : "#FF6B35", borderRadius: 4, transition: "width .5s" }} />
                </div>
                <div style={{ color: ov ? "#f55" : "#666", fontSize: 11 }}>{ov ? `⚠️ +${(T.cbm - c.c).toFixed(2)} CBM over` : `${p.toFixed(1)}% · ${(c.c - T.cbm).toFixed(2)} free`}</div>
              </div>
            ); })}
          </div>
        </div>
      </>}
    </div>
  );
}

// ─── TOOL: INCOTERMS ─────────────────────────────────────────────────────────
const INC = [
  { code: "EXW", name: "Ex Works", modes: "Any", risk: "At seller's premises", seller: "Packing only", buyer: "All transport, export, insurance, import", ins: "Buyer", note: "Maximum buyer responsibility.", c: "#4361EE" },
  { code: "FCA", name: "Free Carrier", modes: "Any", risk: "Loaded onto buyer's carrier", seller: "Export clearance, loading at named place", buyer: "Main carriage, insurance, import duties", ins: "Buyer", note: "Best for containerised cargo. 2020 update: B/L onboard notation option.", c: "#4361EE" },
  { code: "CPT", name: "Carriage Paid To", modes: "Any", risk: "Given to 1st carrier at origin", seller: "Export + main carriage to destination", buyer: "Insurance optional, import duties", ins: "Buyer (optional)", note: "Seller pays freight but risk transfers at origin.", c: "#4361EE" },
  { code: "CIP", name: "Carriage & Insurance Paid", modes: "Any", risk: "Given to 1st carrier at origin", seller: "Export + carriage + ICC(A) all-risk insurance", buyer: "Import duties, delivery from named place", ins: "Seller — ICC(A) all risks", note: "2020: upgraded to mandatory all-risk ICC(A) cover.", c: "#4361EE" },
  { code: "DAP", name: "Delivered at Place", modes: "Any", risk: "Arrives at destination, unloaded by buyer", seller: "All costs to destination, excl. import duties", buyer: "Import duties, unloading", ins: "Seller", note: "Door-to-door minus import duties.", c: "#4361EE" },
  { code: "DPU", name: "Delivered at Place Unloaded", modes: "Any", risk: "After unloading at named place", seller: "All costs including unloading at destination", buyer: "Import duties", ins: "Seller", note: "New 2020 rule replacing DAT. Seller must physically unload.", c: "#4361EE" },
  { code: "DDP", name: "Delivered Duty Paid", modes: "Any", risk: "Delivered to buyer's door", seller: "Everything — transport, insurance, import duties", buyer: "Nothing (except unloading if agreed)", ins: "Seller", note: "Maximum seller responsibility. Use with caution.", c: "#4361EE" },
  { code: "FAS", name: "Free Alongside Ship", modes: "Sea only", risk: "Placed alongside vessel at port", seller: "Export clearance, delivery to quayside", buyer: "Loading, freight, insurance, import", ins: "Buyer", note: "Bulk/break-bulk only. Not for containers.", c: "#F72585" },
  { code: "FOB", name: "Free on Board", modes: "Sea only", risk: "Loaded on board vessel", seller: "Export clearance, loading onto vessel", buyer: "Freight, insurance, import duties", ins: "Buyer", note: "Most common for Asia exports. Sea/waterway only.", c: "#F72585" },
  { code: "CFR", name: "Cost & Freight", modes: "Sea only", risk: "On board vessel at origin port", seller: "Export + ocean freight to named port", buyer: "Insurance, import duties, unloading", ins: "Buyer (optional)", note: "Seller pays freight but risk transfers at loading.", c: "#F72585" },
  { code: "CIF", name: "Cost Insurance & Freight", modes: "Sea only", risk: "On board vessel at origin port", seller: "Export + ocean freight + ICC(C) min insurance", buyer: "Import duties, unloading", ins: "Seller — ICC(C) minimum", note: "Common for Letters of Credit. Sea only.", c: "#F72585" },
];

function IncotermsDecoder() {
  const [sel, setSel] = useState(null);
  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(76px,1fr))", gap: 8, marginBottom: 20 }}>
        {INC.map(t => (
          <button key={t.code} onClick={() => setSel(sel?.code === t.code ? null : t)} style={{
            padding: "10px 6px", borderRadius: 10, textAlign: "center",
            background: sel?.code === t.code ? t.c : "#ffffff08",
            border: `1px solid ${sel?.code === t.code ? t.c : "#ffffff12"}`,
            color: sel?.code === t.code ? "#fff" : "#aaa",
            fontSize: 13, fontWeight: 800, cursor: "pointer", transition: "all .15s",
          }}>{t.code}<div style={{ fontSize: 9, marginTop: 3, opacity: 0.7 }}>{t.modes === "Sea only" ? "🚢" : "✈️🚢"}</div></button>
        ))}
      </div>
      {sel ? (
        <div style={{ background: "#ffffff06", border: `1px solid ${sel.c}40`, borderRadius: 14, padding: 20, animation: "pop .2s ease" }}>
          <span style={{ background: `${sel.c}22`, color: sel.c, fontSize: 10, fontWeight: 700, letterSpacing: 1.5, padding: "3px 10px", borderRadius: 20, textTransform: "uppercase" }}>{sel.modes}</span>
          <h3 style={{ color: "#fff", fontSize: 18, fontWeight: 800, margin: "10px 0 4px" }}>{sel.code} — {sel.name}</h3>
          <p style={{ color: "#777", fontSize: 13, margin: "0 0 16px" }}>{sel.note}</p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(180px,1fr))", gap: 10 }}>
            {[{ l: "⚡ Risk Transfers", v: sel.risk }, { l: "📤 Seller Pays", v: sel.seller }, { l: "📥 Buyer Pays", v: sel.buyer }, { l: "🛡️ Insurance", v: sel.ins }].map(r => (

      "Flatbed (20T)":   { cbm: null,maxWt: 20000, dims: "13.6m × 2.4m (open)",    icon: "🚛" },
    },
  };

  const PALLET = { l: 120, w: 80, h: 15, maxStack: 200 }; // Euro pallet cm / kg per pallet

  const [transport, setTransport] = useState("sea");
  const [vehicle, setVehicle]     = useState("40ft Standard");
  const [items, setItems]         = useState([{ desc: "Cartons", l: "", w: "", h: "", qty: "1", wt: "", stackable: true, palletized: false }]);

  // reset vehicle when switching transport mode
  const switchTransport = (t) => {
    setTransport(t);
    setVehicle(Object.keys(VEHICLES[t])[t === "sea" ? 1 : 2]);
  };

  const upd = (i, k, v) => setItems(items.map((r, idx) => idx === i ? { ...r, [k]: v } : r));
  const addRow = () => setItems([...items, { desc: "", l: "", w: "", h: "", qty: "1", wt: "", stackable: true, palletized: false }]);
  const rem = (i) => items.length > 1 && setItems(items.filter((_, idx) => idx !== i));

  const sp = VEHICLES[transport][vehicle] || Object.values(VEHICLES[transport])[0];

  // Per-item calc
  const calc = items.map(it => {
    const L = parseFloat(it.l), W = parseFloat(it.w), H = parseFloat(it.h);
    const qty = parseInt(it.qty) || 1, wt = parseFloat(it.wt) || 0;
    if (!L || !W || !H) return null;
    const unitCBM = (L / 100) * (W / 100) * (H / 100);
    // If palletized: add pallet base height (15cm) per stack. Non-stackable = each box gets its own pallet footprint
    const palletH = it.palletized ? PALLET.h / 100 : 0;
    const effectiveCBM = it.palletized
      ? (L / 100) * (W / 100) * ((H + PALLET.h) / 100) * qty
      : unitCBM * qty;
    return { cbm: effectiveCBM, wt: wt * qty, stackable: it.stackable, palletized: it.palletized, qty, L, W, H, unitCBM };
  }).filter(Boolean);

  const tCBM = calc.reduce((s, c) => s + c.cbm, 0);
  const tWt  = calc.reduce((s, c) => s + c.wt, 0);

// ─── TOOL: TRANSIT TIME CALCULATOR (AI-powered) ───────────────────────────────
function TransitTool() {
  const [f, setF] = useState({ origin: "", dest: "", mode: "sea", type: "fcl", depart: "", customOrigin: "", customDest: "" });
  const [useCustomOrigin, setUseCustomOrigin] = useState(false);
  const [useCustomDest, setUseCustomDest]     = useState(false);
  const [result, setResult]   = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState(null);

  const origin = useCustomOrigin ? f.customOrigin : f.origin;
  const dest   = useCustomDest   ? f.customDest   : f.dest;

  const calc = async () => {
    if (!origin || !dest) return;
    setLoading(true); setResult(null); setError(null);
    const modeLabel = f.mode === "sea" ? `Sea freight (${f.type.toUpperCase()})` : "Air freight";
    const prompt = `You are a freight transit time expert. Provide accurate port-to-port transit time estimates.

Route: ${origin} → ${dest}
Mode: ${modeLabel}

Respond ONLY with a JSON object, no markdown, no explanation:
{
  "days": <integer, most likely transit days port-to-port>,
  "range": "<min>–<max> days range as a string>",
  "directService": <true if direct service exists, false if transshipment needed>,
  "transshipmentPort": "<main hub if transshipment, else null>",
  "carriers": ["<up to 3 carriers that serve this route>"],
  "customsDays": <integer, typical customs clearance days at destination>,
  "notes": "<1-2 sentences: any important route notes, seasonal factors, known delays, or service info>",
  "confidence": "<high|medium|low>"
}`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b => b.type === "text")?.text || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      // Compute arrival date
      let arrivalDate = null, earliestDate = null, latestDate = null;
      if (f.depart) {
        const totalMid  = parsed.days + parsed.customsDays + (f.type === "lcl" ? 5 : 0);
        const [minT, maxT] = parsed.range.split("–").map(s => parseInt(s));
        const totalMin  = minT + (f.type === "lcl" ? 5 : 0);
        const totalMax  = maxT + parsed.customsDays + (f.type === "lcl" ? 5 : 0);
        const toDate = (d, days) => { const dt = new Date(d); dt.setDate(dt.getDate() + days); return dt.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }); };
        arrivalDate   = toDate(f.depart, totalMid);
        earliestDate  = toDate(f.depart, totalMin);
        latestDate    = toDate(f.depart, totalMax);
      }
      setResult({ ...parsed, arrivalDate, earliestDate, latestDate, lclExtra: f.type === "lcl" ? 5 : 0 });
    } catch (e) {
      setError("Could not retrieve transit estimate. Please try again.");
    }
    setLoading(false);
  };

  const si = { background: "#0a0a18", border: "1px solid #ffffff15", borderRadius: 8, color: "#fff", padding: "10px 12px", fontSize: 13, outline: "none", width: "100%", boxSizing: "border-box", fontFamily: "inherit" };
  const confidenceColor = { high: "#06D6A0", medium: "#FF6B35", low: "#f55" };

  return (
    <div>
      {/* Mode tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
        {[["sea", "🚢 Sea Freight"], ["air", "✈️ Air Freight"]].map(([m, l]) => (
          <button key={m} onClick={() => setF(p => ({ ...p, mode: m }))} style={{ padding: "8px 16px", borderRadius: 20, background: f.mode === m ? "#118AB2" : "#ffffff08", border: `1px solid ${f.mode === m ? "#118AB2" : "#ffffff12"}`, color: f.mode === m ? "#fff" : "#666", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{l}</button>
        ))}
        {f.mode === "sea" && [["fcl", "FCL"], ["lcl", "LCL (+5 days consolidation)"]].map(([t, l]) => (
          <button key={t} onClick={() => setF(p => ({ ...p, type: t }))} style={{ padding: "8px 14px", borderRadius: 20, background: f.type === t ? "#06D6A0" : "#ffffff08", border: `1px solid ${f.type === t ? "#06D6A0" : "#ffffff12"}`, color: f.type === t ? "#fff" : "#666", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{l}</button>

      </div>

      {/* Origin / Dest inputs */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
        {/* Origin */}
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <label style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Origin Port / City</label>

          </div>
          {useCustomOrigin
            ? <input value={f.customOrigin} onChange={e => setF(p => ({ ...p, customOrigin: e.target.value }))} placeholder="e.g. Bandar Abbas, Iran" style={si} />

                <option value="">— Select —</option>
                {PORTS.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
          }
        </div>
        {/* Destination */}
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <label style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Destination Port / City</label>

          </div>
          {useCustomDest
            ? <input value={f.customDest} onChange={e => setF(p => ({ ...p, customDest: e.target.value }))} placeholder="e.g. Mombasa, Kenya" style={si} />
            : <select value={f.dest} onChange={e => setF(p => ({ ...p, dest: e.target.value }))} style={si}>
                <option value="">— Select —</option>
                {PORTS.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
          }
        </div>
        {/* Departure date */}
        <div>
          <label style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6, display: "block" }}>Departure Date (optional)</label>
          <input type="date" value={f.depart} onChange={e => setF(p => ({ ...p, depart: e.target.value }))} style={si} />
        </div>
      </div>

      <button

                <div style={{ color: "#555", fontSize: 11 }}>{c.s}</div>
              </div>
            ))}
          </div>

          {/* Timeline bar */}
          {f.depart && (
            <div style={{ background: "#ffffff06", border: "1px solid #ffffff10", borderRadius: 12, padding: "14px 16px", marginBottom: 14 }}>

                {[
                  { label: f.mode === "sea" ? "Sea transit" : "Air transit", days: result.days + result.lclExtra, color: "#118AB2" },
                  { label: "Customs", days: result.customsDays, color: "#FF6B35" },
                ].map((seg, i) => {
                  const total = result.days + result.lclExtra + result.customsDays;
                  const pct = (seg.days / total) * 100;
                  return (
                    <div key={i} title={`${seg.label}: ${seg.days} days`} style={{ width: `${pct}%`, background: seg.color, display: "flex", alignItems: "center", justifyContent: "center" }}>

              <div style={{ background: "#ffffff06", border: "1px solid #ffffff10", borderRadius: 10, padding: "12px 14px" }}>

            </div>
          </div>

          {/* Route notes */}
          {result.notes && (
            <div style={{ background: "#118AB210", border: "1px solid #118AB230", borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#aaa" }}>
              📌 {result.notes}
            </div>
          )}
        </div>
      )}

      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

function HSCodeFinder({ onSendToDuty }) {
  const ACC = "#7209B7";
  const [mode, setMode] = useState("keyword"); // "keyword" | "reverse"
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [searched, setSearched] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiSource, setAiSource] = useState(false); // true = results from AI
  const [expandedChapter, setExpandedChapter] = useState(null);
  const [copiedCode, setCopiedCode] = useState(null);
  const [error, setError] = useState(null);

  const isReverseCode = (q) => /^\d{4,}/.test(q.trim().replace(/\./g, "").replace(/\s/g, ""));

  const staticSearch = (q) => {
    const lq = q.toLowerCase().trim();
    // Reverse lookup: query is a code
    if (mode === "reverse" || isReverseCode(lq)) {
      const stripped = lq.replace(/[.\s]/g, "");
      return HS_DB.filter(item => item.code.replace(/[.\s]/g, "").startsWith(stripped));
    }
    // Keyword search
    return HS_DB.filter(item =>
      item.keywords.some(k => lq.includes(k) || k.includes(lq)) ||
      item.desc.toLowerCase().includes(lq) ||
      item.code.includes(lq)
    ).slice(0, 6);
  };

  const aiSearch = async (q) => {
    setAiLoading(true);
    setError(null);
    const isReverse = mode === "reverse" || isReverseCode(q);
    const prompt = isReverse
      ? `For HS code "${q}", provide the product description, chapter details, UAE/GCC import duty rate, and any excise or prohibited status in UAE. Return ONLY valid JSON — no markdown, no backticks:\n{\n  "results": [\n    {\n      "code": "exact HS code",\n      "desc": "official product description",\n      "chapter": "chapter number as string e.g. 84",\n      "chapterDesc": "full chapter description",\n      "uaeDuty": duty rate as number (e.g. 5 for 5%),\n      "uaeExcise": true or false,\n      "exciseNote": "note or null",\n      "prohibited": true or false,\n      "prohibitedNote": "note or null",\n      "note": "other UAE-specific import note or null"\n    }\n  ]\n}`
      : `Find the best HS codes (HS 2022) for the product: "${q}". Provide up to 4 most likely matches. Also include UAE/GCC import duty rate and any excise or prohibited status in UAE. Return ONLY valid JSON — no markdown, no backticks:\n{\n  "results": [\n    {\n      "code": "HS code with dot notation e.g. 8471.30",\n      "desc": "official product description",\n      "chapter": "chapter number as string e.g. 84",\n      "chapterDesc": "full chapter description",\n      "uaeDuty": duty rate as number (e.g. 5 for 5%),\n      "uaeExcise": true or false,\n      "exciseNote": "note or null",\n      "prohibited": true or false,\n      "prohibitedNote": "note or null",\n      "note": "other UAE-specific import note or null"\n    }\n  ]\n}`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "You are a WCO-certified customs classification expert with deep knowledge of HS 2022 nomenclature, UAE Federal Customs Authority tariffs, and GCC Common Customs Law. Always respond ONLY with valid JSON — no markdown, no backticks, no preamble.",
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await res.json();
      const text = data.content?.map(b => b.text || "").join("") || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      return parsed.results || [];
    } catch (e) {
      setError("AI lookup failed — please try again or rephrase your query.");
      return [];
    } finally {
      setAiLoading(false);
    }
  };

  const handleSearch = async () => {
    const q = query.trim();
    if (!q) return;
    setResults([]);
    setSearched(false);
    setAiSource(false);
    setError(null);
    setExpandedChapter(null);

    const staticResults = staticSearch(q);
    if (staticResults.length > 0) {
      setResults(staticResults);
      setAiSource(false);
      setSearched(true);
    } else {
      // AI fallback
      const aiResults = await aiSearch(q);
      setResults(aiResults);
      setAiSource(true);
      setSearched(true);
    }
  };

  const handleCopy = (code) => {
    navigator.clipboard?.writeText(code);
    setCopiedCode(code);
    setTimeout(() => setCopiedCode(null), 1800);
  };

  const inp = {
    flex: 1, background: "#0a0a18", border: "1px solid #ffffff15",
    borderRadius: 10, color: "#fff", padding: "12px 14px", fontSize: 14,
    outline: "none", fontFamily: "inherit", transition: "border-color .2s",
  };
  const pill = (active) => ({
    padding: "7px 18px", borderRadius: 20, fontSize: 13, fontWeight: 700,
    cursor: "pointer", border: "none", transition: "all .2s",
    background: active ? ACC : "#ffffff08",
    color: active ? "#fff" : "#666",
  });

  return (
    <div>
      {/* disclaimer */}
      <div style={{ background: `${ACC}10`, border: `1px solid ${ACC}30`, borderRadius: 10, padding: "9px 14px", marginBottom: 16, fontSize: 12, color: "#9B5DE5", display: "flex", gap: 8, alignItems: "center" }}>
        <span>ℹ️</span>
        <span>Indicative classifications only. Always verify with a licensed customs broker before filing. Based on HS 2022 nomenclature.</span>
      </div>

      {/* mode toggle */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <button style={pill(mode === "keyword")} onClick={() => { setMode("keyword"); setResults([]); setSearched(false); setQuery(""); }}>🔍 Search by Product</button>
        <button style={pill(mode === "reverse")} onClick={() => { setMode("reverse"); setResults([]); setSearched(false); setQuery(""); }}>↩ HS Code → Product</button>
      </div>

      {/* search input */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleSearch()}
          placeholder={mode === "reverse" ? "Enter HS code, e.g. 8471.30 or 8471…" : "e.g. wireless earbuds, solar panels, olive oil…"}
          style={inp}
        />
        <button
          onClick={handleSearch}
          disabled={aiLoading}
          style={{
            padding: "12px 22px", background: aiLoading ? "#ffffff15" : ACC, border: "none",
            borderRadius: 10, color: aiLoading ? "#555" : "#fff", fontSize: 14, fontWeight: 800,
            cursor: aiLoading ? "not-allowed" : "pointer", whiteSpace: "nowrap", transition: "all .2s",
          }}
        >
          {aiLoading ? "🤖 Searching AI…" : mode === "reverse" ? "↩ Look Up" : "🔍 Find Code"}
        </button>
      </div>

      {/* source badge */}
      {searched && results.length > 0 && (
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <span style={{
            fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20,
            background: aiSource ? "#F72585" + "20" : "#06D6A0" + "20",
            color: aiSource ? "#F72585" : "#06D6A0",
            border: `1px solid ${aiSource ? "#F72585" : "#06D6A0"}30`,
          }}>
            {aiSource ? "🤖 AI Classification" : "📦 Static Database"}
          </span>
          <span style={{ color: "#444", fontSize: 12 }}>{results.length} result{results.length !== 1 ? "s" : ""}</span>
        </div>
      )}

      {/* error */}
      {error && (
        <div style={{ color: "#F72585", background: "#F7258510", border: "1px solid #F7258530", borderRadius: 10, padding: "10px 14px", fontSize: 13, marginBottom: 12 }}>
          ⚠️ {error}
        </div>
      )}

      {/* no results */}
      {searched && !aiLoading && results.length === 0 && !error && (
        <div style={{ color: "#444", textAlign: "center", padding: "32px 0", fontSize: 14 }}>
          No results found. Try rephrasing, or use more specific product terms.
        </div>
      )}

      {/* results */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {results.map((r, i) => {
          const chOpen = expandedChapter === i;
          const isDanger = r.prohibited;
          const isExcise = r.uaeExcise;

          return (
            <div key={i} style={{

              {/* header row */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10, marginBottom: 10 }}>

                  <span style={{ background: `${ACC}25`, color: "#9B5DE5", fontSize: 16, fontWeight: 900, padding: "4px 12px", borderRadius: 8, letterSpacing: 1, fontVariantNumeric: "tabular-nums" }}>{r.code}</span>
                  {isDanger && <span style={{ background: "#F7258520", color: "#F72585", fontSize: 11, fontWeight: 800, padding: "3px 9px", borderRadius: 20 }}>🚫 PROHIBITED IN UAE</span>}

                {/* action buttons */}
                <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
                  <button

                  >{copiedCode === r.code ? "✓ Copied" : "Copy"}</button>
                  <a
                    href={`https://www.uaecustoms.gov.ae/en/pages/hs-code-search`}
                    target="_blank" rel="noopener noreferrer"

                  >UAE Customs ↗</a>
                  <a
                    href={`https://www.wcoomd.org/en/topics/nomenclature/instrument-and-tools/hs-nomenclature-2022-edition.aspx`}
                    target="_blank" rel="noopener noreferrer"
                    style={{ background: "#ffffff08", border: "1px solid #ffffff15", borderRadius: 8, color: "#666", padding: "6px 12px", fontSize: 12, textDecoration: "none", fontWeight: 700 }}
                  >WCO ↗</a>
                  {onSendToDuty && (
                    <button
                      onClick={() => onSendToDuty(r.code)}
                      style={{ background: "#06D6A015", border: "1px solid #06D6A035", borderRadius: 8, color: "#06D6A0", padding: "6px 12px", fontSize: 12, cursor: "pointer", fontWeight: 700 }}
                    >→ Duty Est.</button>
                  )}
                </div>
              </div>

              {/* description */}
              <div style={{ color: "#ddd", fontSize: 14, lineHeight: 1.5, marginBottom: 10 }}>{r.desc}</div>

              {/* info pills row */}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                {/* UAE duty */}
                <div style={{ background: "#ffffff0a", border: "1px solid #ffffff12", borderRadius: 8, padding: "5px 10px", fontSize: 12 }}>
                  <span style={{ color: "#555", fontWeight: 600 }}>UAE Duty </span>
                  <span style={{ color: r.uaeDuty === 0 ? "#06D6A0" : "#F4D03F", fontWeight: 800 }}>{r.uaeDuty ?? 5}%</span>
                </div>
                {/* chapter badge — clickable */}
                <button
                  onClick={() => setExpandedChapter(chOpen ? null : i)}
                  style={{ background: "#ffffff0a", border: "1px solid #ffffff12", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#888", fontWeight: 600, display: "flex", alignItems: "center", gap: 5 }}
                >
                  <span>Ch. {r.chapter}</span>
                  <span style={{ color: "#444", fontSize: 10 }}>{chOpen ? "▲" : "▼"}</span>
                </button>
              </div>

              {/* WCO chapter explanation */}
              {chOpen && (
                <div style={{ marginTop: 10, background: `${ACC}0d`, border: `1px solid ${ACC}20`, borderRadius: 10, padding: "10px 14px" }}>
                  <div style={{ color: "#9B5DE5", fontSize: 12, fontWeight: 700, marginBottom: 4 }}>📖 WCO Chapter {r.chapter}</div>
                  <div style={{ color: "#aaa", fontSize: 13, lineHeight: 1.5 }}>{r.chapterDesc || "General classification chapter."}</div>
                  <a
                    href={`https://www.wcoomd.org/en/topics/nomenclature/instrument-and-tools/hs-nomenclature-2022-edition.aspx`}
                    target="_blank" rel="noopener noreferrer"
                    style={{ display: "inline-block", marginTop: 6, color: "#7209B7", fontSize: 12, textDecoration: "none", fontWeight: 700 }}
                  >View full chapter on WCO ↗</a>
                </div>
              )}

              {/* excise / prohibited / note alerts */}
              {isDanger && r.prohibitedNote && (
                <div style={{ marginTop: 10, background: "#F7258510", border: "1px solid #F7258530", borderRadius: 9, padding: "8px 12px", fontSize: 12, color: "#F72585" }}>
                  🚫 {r.prohibitedNote}
                </div>
              )}
              {isExcise && r.exciseNote && !isDanger && (
                <div style={{ marginTop: 10, background: "#FF9F1C10", border: "1px solid #FF9F1C30", borderRadius: 9, padding: "8px 12px", fontSize: 12, color: "#FF9F1C" }}>
                  ⚠️ {r.exciseNote}
                </div>
              )}
              {r.note && !isDanger && (
                <div style={{ marginTop: 10, background: "#ffffff08", border: "1px solid #ffffff12", borderRadius: 9, padding: "8px 12px", fontSize: 12, color: "#999" }}>
                  💡 {r.note}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* footer guidance */}
      {results.length > 0 && (
        <div style={{ marginTop: 16, background: "#ffffff05", border: "1px solid #ffffff0d", borderRadius: 12, padding: "12px 16px" }}>
          <div style={{ color: "#444", fontSize: 12, lineHeight: 1.6 }}>
            💡 <strong style={{ color: "#666" }}>Verify your classification</strong> with the{" "}
            <a href="https://www.uaecustoms.gov.ae" target="_blank" rel="noopener noreferrer" style={{ color: ACC, textDecoration: "none" }}>UAE Federal Customs Authority ↗</a>
            {" "}or the{" "}
            <a href="https://www.wcoomd.org/en/topics/nomenclature/instrument-and-tools/hs-nomenclature-2022-edition.aspx" target="_blank" rel="noopener noreferrer" style={{ color: ACC, textDecoration: "none" }}>WCO HS 2022 Nomenclature ↗</a>
            {" "}before filing customs documents. AI classifications are indicative only.
          </div>
        </div>
      )}
    </div>
  );
}

    const matchType = filter === "all" || c.type === filter;
    const matchSearch = !search || c.name.toLowerCase().includes(search.toLowerCase()) || c.abbr.toLowerCase().includes(search.toLowerCase()) || c.region.toLowerCase().includes(search.toLowerCase());

                    {trackingNo && c.trackParam && <span style={{ background: `${accentColor}20`, color: accentColor, fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 4 }}>AUTO-FILL</span>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {filtered.length === 0 && (
        <div style={{ textAlign: "center", padding: "40px 0", color: "#333", fontSize: 14 }}>No carriers found for "{search}"</div>
      )}

      <div style={{ marginTop: 10, background: "#ffffff04", border: "1px solid #ffffff08", borderRadius: 10, padding: "10px 14px", fontSize: 11, color: "#333", lineHeight: 1.6 }}>
        💡 <strong style={{ color: "#555" }}>How it works:</strong> Enter your tracking number above, then click any carrier to open their official tracking page. Carriers marked <span style={{ color: accentColor, fontWeight: 700 }}>AUTO-FILL</span> will pre-populate your number directly into the URL.
      </div>
    </div>
  );
}

  };

  const GCC_COUNTRIES = {
    AE: { name: "🇦🇪 UAE", currency: "AED", fxRate: 3.67, vat: 5, label: "VAT" },
    SA: { name: "🇸🇦 Saudi Arabia", currency: "SAR", fxRate: 3.75, vat: 15, label: "VAT" },
    KW: { name: "🇰🇼 Kuwait", currency: "KWD", fxRate: 0.308, vat: 0, label: "No VAT" },
    QA: { name: "🇶🇦 Qatar", currency: "QAR", fxRate: 3.64, vat: 0, label: "No VAT" },
    BH: { name: "🇧🇭 Bahrain", currency: "BHD", fxRate: 0.376, vat: 10, label: "VAT" },
    OM: { name: "🇴🇲 Oman", currency: "OMR", fxRate: 0.385, vat: 5, label: "VAT" },
  };

  const [hsInput, setHsInput] = useState(prefillCode || "");
  const [country, setCountry] = useState("AE");
  const [lookupResult, setLookupResult] = useState(null);
  const [lookupError, setLookupError] = useState(null);
  const [cifValue, setCifValue] = useState("");
  const [freightVal, setFreightVal] = useState("");
  const [insVal, setInsVal] = useState("");
  const [calcResult, setCalcResult] = useState(null);

  // Sync prefill from HS Code Finder
  useState(() => { if (prefillCode) setHsInput(prefillCode); }, [prefillCode]);

  const lookupHS = () => {
    setLookupError(null); setLookupResult(null); setCalcResult(null);
    const raw = hsInput.replace(/[.\-\s]/g, "");
    if (!raw || raw.length < 4) { setLookupError("Enter at least 4 digits of your HS code."); return; }
    // Try 6-digit, then 4-digit match
    const key6 = raw.slice(0, 6).replace(/(\d{4})(\d{2})/, "$1.$2");
    const key4 = raw.slice(0, 4);
    const match = GCC_DUTY[raw.slice(0, 4)] || GCC_DUTY[raw.slice(0, 6)] || null;
    if (match) {
      setLookupResult({ ...match, code: raw.slice(0, 4) });
    } else {
      // Default GCC standard rate
      setLookupResult({ code: raw.slice(0, 4), desc: "General merchandise (standard GCC CET rate)", duty: 5, vat: GCC_COUNTRIES[country].vat, notes: "Default GCC Common External Tariff rate. Verify with UAE FCA / GCC customs authority for exact classification." });

    const vatRate = lookupResult.vat !== undefined ? lookupResult.vat : c.vat;

    const vat = (cif + duty) * (vatRate / 100);
    const total = cif + duty + vat;
    const localTotal = total * c.fxRate;

        {lookupError && <div style={{ marginTop: 10, color: "#f55", fontSize: 12, background: "#f5550010", border: "1px solid #f5550030", borderRadius: 8, padding: "8px 12px" }}>{lookupError}</div>}
      </div>

      {/* Lookup Result */}
      {lookupResult && (
        <div style={{ background: "#ffffff05", border: `1px solid ${accentColor}25`, borderRadius: 14, padding: "18px 16px", marginBottom: 16 }}>
          <div style={{ marginBottom: 14 }}>
            <div style={{ color: accentColor, fontSize: 10, fontWeight: 800, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 4 }}>HS {lookupResult.code} — GCC Duty Rate</div>

                {[
                  { l: "Cargo Value", v: parseFloat(cifValue) || 0, color: "#4361EE" },

                  { l: "Import Duty", v: calcResult.duty, color: accentColor },

                ].filter(s => s.v > 0).map(s => (
                  <div key={s.l} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ color: "#aaa", fontSize: 12, fontWeight: 600 }}>{s.l}</span>
                      <span style={{ color: "#555", fontSize: 12 }}>${s.v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ({((s.v / calcResult.total) * 100).toFixed(1)}%)</span>
                    </div>
                    <div style={{ background: "#ffffff08", borderRadius: 4, height: 7, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(s.v / calcResult.total) * 100}%`, background: s.color, borderRadius: 4, transition: "width .6s cubic-bezier(.4,0,.2,1)" }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── TOOL: CARBON FOOTPRINT ────────────────────────────────────────────────────
function CarbonTool() {
  const FACTORS = { sea: 0.016, air: 0.602, road: 0.096, rail: 0.028 };
  const NAMES = { sea: "🚢 Sea", air: "✈️ Air", road: "🚛 Road", rail: "🚂 Rail" };
  const [f, setF] = useState({ mode: "sea", dist: "", wt: "", cbm: "" });
  const [result, setResult] = useState(null);
  const calc = () => {
    const dist = parseFloat(f.dist), wt = parseFloat(f.wt) || (parseFloat(f.cbm) * 500);
    if (!dist || !wt) return;
    const co2 = (wt / 1000) * dist * FACTORS[f.mode];
    const compare = Object.entries(FACTORS).map(([m, fac]) => ({ m, co2: (wt / 1000) * dist * fac })).sort((a, b) => a.co2 - b.co2);
    setResult({ co2, trees: co2 / 21.77, cars: co2 / 120, compare });
  };
  const si = { background: "#0a0a18", border: "1px solid #ffffff15", borderRadius: 8, color: "#fff", padding: "10px 12px", fontSize: 14, outline: "none", width: "100%", boxSizing: "border-box", fontFamily: "inherit" };
  return (
    <div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
        {Object.entries(NAMES).map(([k, v]) => <button key={k} onClick={() => setF({ ...f, mode: k })} style={{ padding: "8px 14px", borderRadius: 20, background: f.mode === k ? "#52B788" : "#ffffff08", border: `1px solid ${f.mode === k ? "#52B788" : "#ffffff12"}`, color: f.mode === k ? "#fff" : "#888", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{v}</button>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 14 }}>
        {[{ k: "dist", l: "Distance (km)", ph: "12000" }, { k: "wt", l: "Weight (kg)", ph: "5000" }, { k: "cbm", l: "Or CBM", ph: "10" }].map(({ k, l, ph }) => (
          <div key={k}><label style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 5, display: "block" }}>{l}</label><input type="number" value={f[k]} onChange={e => setF({ ...f, [k]: e.target.value })} placeholder={ph} style={si} /></div>
        ))}
      </div>
      <button onClick={calc} style={{ padding: "12px 28px", background: "#52B788", border: "none", borderRadius: 12, color: "#fff", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>Calculate Footprint</button>
      {result && <div style={{ marginTop: 18 }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))", gap: 10, marginBottom: 16 }}>
          {[{ l: "CO₂ Emitted", v: `${result.co2.toFixed(2)} kg`, s: `${(result.co2 / 1000).toFixed(3)} tonnes` }, { l: "Trees to Offset", v: result.trees.toFixed(1), s: "1 year each" }, { l: "Car Equivalent", v: `${result.cars.toFixed(0)} km`, h: true }].map(c => (
            <div key={c.l} style={{ background: c.h ? "#52B78815" : "#ffffff06", border: `1px solid ${c.h ? "#52B78845" : "#ffffff10"}`, borderRadius: 10, padding: "12px 14px" }}>
              <div style={{ color: "#555", fontSize: 10, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase" }}>{c.l}</div>
              <div style={{ color: c.h ? "#52B788" : "#fff", fontSize: 15, fontWeight: 800, marginTop: 3 }}>{c.v}</div>
              {c.s && <div style={{ color: "#555", fontSize: 11 }}>{c.s}</div>}
            </div>
          ))}
        </div>
        {result.compare.map((m, i) => (
          <div key={m.m} style={{ marginBottom: 8 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
              <span style={{ color: "#ddd", fontSize: 12, fontWeight: 700 }}>{i === 0 ? "🌿 " : ""}{NAMES[m.m]}</span>
              <span style={{ color: "#666", fontSize: 12 }}>{m.co2.toFixed(1)} kg CO₂{m.m === f.mode ? " ← current" : ""}</span>
            </div>
            <div style={{ background: "#ffffff08", borderRadius: 4, height: 8 }}>
              <div style={{ height: "100%", width: `${(m.co2 / result.compare[result.compare.length - 1].co2) * 100}%`, background: m.m === "sea" || m.m === "rail" ? "#52B788" : m.m === "road" ? "#F77F00" : "#f55", borderRadius: 4, transition: "width .5s" }} />
            </div>
          </div>
        ))}
      </div>}
    </div>
  );
}

// ─── TOOL: CARGO INSURANCE ────────────────────────────────────────────────────
function InsuranceTool() {
  const RATES = { sea: { A: 0.35, B: 0.25, C: 0.15 }, air: { A: 0.25, B: 0.18, C: 0.10 }, road: { A: 0.30, B: 0.20, C: 0.12 } };
  const CATS = { general: { m: 1.0, l: "General Cargo" }, fragile: { m: 1.5, l: "Fragile / Electronics" }, perishable: { m: 1.8, l: "Perishable / Food" }, hazmat: { m: 2.5, l: "Hazardous Materials" }, machinery: { m: 1.3, l: "Heavy Machinery" } };
  const [f, setF] = useState({ value: "", freight: "", mode: "sea", clause: "A", cat: "general" });

  const calc = () => {
    const v = parseFloat(f.value), fr = parseFloat(f.freight) || 0;

    const cif = v + fr; const iv = cif * 1.10;
    const rate = RATES[f.mode][f.clause] / 100; const mult = CATS[f.cat].m;
    setResult({ iv, premium: Math.max(iv * rate * mult, 30), rate: rate * mult * 100 });
  };
  const si = { background: "#0a0a18", border: "1px solid #ffffff15", borderRadius: 8, color: "#fff", padding: "10px 12px", fontSize: 14, outline: "none", width: "100%", boxSizing: "border-box", fontFamily: "inherit" };
  const ICC_RISKS = [

    { risk: "Stranding, grounding, sinking or capsizing of vessel", A: true, B: true, C: true },
    { risk: "Overturning / derailment of land conveyance", A: true, B: true, C: true },
    { risk: "Collision or contact of vessel with external object", A: true, B: true, C: true },
    { risk: "Discharge of cargo at port of distress", A: true, B: true, C: true },
    { risk: "General average sacrifice", A: true, B: true, C: true },
    { risk: "Jettison", A: true, B: true, C: true },
    { risk: "Earthquake, volcanic eruption or lightning", A: true, B: true, C: false },
    { risk: "Washing overboard", A: true, B: true, C: false },
    { risk: "Entry of sea/lake/river water into vessel or container", A: true, B: true, C: false },
    { risk: "Total loss of package lost overboard or dropped during loading", A: true, B: true, C: false },
    { risk: "Theft, pilferage and non-delivery (TPND)", A: true, B: false, C: false },
    { risk: "Rainwater / fresh water damage", A: true, B: false, C: false },
    { risk: "Contamination", A: true, B: false, C: false },
    { risk: "Hook damage", A: true, B: false, C: false },
    { risk: "Shortage / leakage", A: true, B: false, C: false },
    { risk: "Breakage, chipping, denting or scratching", A: true, B: false, C: false },
    { risk: "All other accidental physical loss or damage", A: true, B: false, C: false },

        <div><label style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 5, display: "block" }}>Freight Cost (USD)</label><input type="number" value={f.freight} onChange={e => setF({ ...f, freight: e.target.value })} placeholder="800" style={si} /></div>

        <div><label style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 5, display: "block" }}>Cargo Category</label><select value={f.cat} onChange={e => setF({ ...f, cat: e.target.value })} style={si}>{Object.entries(CATS).map(([k, v]) => <option key={k} value={k}>{v.l}</option>)}</select></div>

            <button key={k} onClick={() => setF({ ...f, clause: k })} style={{ padding: "10px 16px", borderRadius: 10, background: f.clause === k ? col + "20" : "#ffffff08", border: `1px solid ${f.clause === k ? col : "#ffffff12"}`, color: f.clause === k ? col : "#666", fontSize: 12, fontWeight: 800, cursor: "pointer", flex: 1, minWidth: 130 }}>{l}</button>

                </div>
              ))}
            </div>
          ))}
          <div style={{ padding: "12px 16px", borderTop: "1px solid #ffffff08", background: "#ffffff04" }}>
            <div style={{ color: "#444", fontSize: 11, lineHeight: 1.6 }}>⚠️ <strong style={{ color: "#555" }}>Common Exclusions (all clauses):</strong> Inherent vice, delay, war risks (covered by IWC), strikes (covered by ISC), wilful misconduct, normal wear & tear, inadequate packing, nuclear risks.</div>

                onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.borderColor = "#ffffff0c"; }}
              >
                <div style={{ position: "absolute", top: -18, right: -18, width: 70, height: 70, background: t.accent, borderRadius: "50%", filter: "blur(36px)", opacity: 0.13 }} />
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                  <span style={{ fontSize: 28 }}>{t.icon}</span>
                  <span style={{ background: `${t.accent}18`, color: t.accent, fontSize: 9, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", padding: "3px 8px", borderRadius: 20 }}>{t.cat}</span>
                </div>
                <h3 style={{ color: "#fff", fontSize: 14, fontWeight: 800, margin: "0 0 6px" }}>{t.name}</h3>
                <p style={{ color: "#444", fontSize: 12, lineHeight: 1.5, margin: "0 0 14px" }}>{t.desc}</p>
                <div style={{ color: t.accent, fontSize: 12, fontWeight: 700 }}>Open Tool →</div>
              </div>
            ))}
          </div>
        </>
      ) : (
        <div style={{ maxWidth: 920, margin: "0 auto", padding: "24px 20px 60px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 22, flexWrap: "wrap" }}>
            <span style={{ fontSize: 32 }}>{activeMeta.icon}</span>
            <div>
              <span style={{ background: `${activeMeta.accent}18`, color: activeMeta.accent, fontSize: 9, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", padding: "3px 9px", borderRadius: 20, display: "inline-block", marginBottom: 4 }}>{activeMeta.cat}</span>
              <h2 style={{ color: "#fff", fontSize: 20, fontWeight: 800, margin: 0 }}>{activeMeta.name}</h2>
            </div>
          </div>
          <div style={{ background: "#0d0d1f", border: `1px solid ${activeMeta.accent}22`, borderRadius: 18, padding: "26px 22px" }}>
            <ActiveTool onSendToDuty={active === "hscode" ? handleSendToDuty : undefined} prefillCode={active === "duty" ? dutyPrefill : undefined} />
          </div>
          <div style={{ marginTop: 28 }}>
            <div style={{ color: "#333", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 12 }}>Other Tools</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {TOOLS.filter(t => t.id !== active).map(t => (
                <button key={t.id} onClick={() => setActive(t.id)} style={{ padding: "7px 13px", background: "#0d0d1f", border: "1px solid #ffffff0c", borderRadius: 20, color: "#666", fontSize: 11, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, transition: "all .15s" }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = t.accent + "50"; e.currentTarget.style.color = t.accent; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "#ffffff0c"; e.currentTarget.style.color = "#666"; }}
                >{t.icon} {t.name}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
